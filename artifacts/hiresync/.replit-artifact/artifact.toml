kind = "web"
previewPath = "/"
title = "HireSync AI"
version = "1.0.0"
id = "artifacts/hiresync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19127
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hiresync run dev"

[services.env]
PORT = "19127"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hiresync", "run", "build"]
publicDir = "artifacts/hiresync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
